description: "VSCO 2 Community Edition (CE) is an open-source, open-ended subset of the main VSCO 2 library designed for young composers, hobbyist sample library developers, and students around the world to create better sounding music for free and learn more about the process of sample library development.

The samples are mapped with no significant tweaks or changes to the sounds or their layout. As a result, the sound is natural and great for ambient and calm orchestral, but may seem a little 'loose' if you are used to General MIDI soundfonts or synthesizers.

The samples have been recorded by Sam Gossner & Simon Dalzell. Sample Cutting by Elan Hickler/Soundemote."
