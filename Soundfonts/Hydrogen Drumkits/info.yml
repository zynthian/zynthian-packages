description: "A collection of hydriogen2 drumkits that you can use in zynthian with Fabla and DrMr sampler. Most of included kits are drum-machines from 80s & 90s, but it also includes the ethnic percussion kit 'CircAfrique v4' and others.

Note that many of the original kits don't mute their open hi-hat sounds when the hi-hat closed sound is triggered. The hi-hat group settings have been adjusted for most of this collection to mute the open hat when the closed hat is triggered.

The collection has been compiled from the hydrogen kits installable with KXStudio and additional kits provided by Slackermedia and other sources. "
