description: "Cassette From A Dream is a free Lo-Fi sample pack! This is the biggest sample I offer for free! A ton of drum loops, perc loops, and melodies!

The music in this pack is Creative Commons CC0! Please consider using its contents to make songs you can add to the creative commons!

You can support my goal of growing the Creative Commons by joining me on Patreon as a paid member :). You could also purchase one of the sample packs or VSTs I have on here. Another option is to message me about commission work for a project you are working on! Let's create things together and fill this world with more art :)"
